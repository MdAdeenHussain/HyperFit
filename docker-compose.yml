version: '3.9'

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hyperfit
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - '5000:5000'

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  pgdata:
